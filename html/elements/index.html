<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoplight Elements</title>
    <link rel="stylesheet" href="styles.min.css">
    <style>
        body { margin: 0; padding: 0; height: 100vh; }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const specUrl = params.get('url') || 'https://petstore3.swagger.io/api/v3/openapi.json';
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('docs').apiDescriptionUrl = specUrl;
        });
    </script>
</head>
<body>
    <elements-api id="docs" router="hash" layout="sidebar"></elements-api>
    <script src="web-components.min.js"></script>
</body>
</html>
